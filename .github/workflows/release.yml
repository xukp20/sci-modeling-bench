name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected_tag = f"v{version}"
          if os.environ["GITHUB_REF_NAME"] != expected_tag:
              raise SystemExit(f"release tag must be {expected_tag}")
          PY
      - name: Install build tools
        run: python -m pip install ".[dev]"
      - name: Run release tests
        run: python -m pytest -m "not integration"
      - name: Build wheel and source distribution
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check --strict dist/*
      - name: Store distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Create release and attach distributions
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --repo "$GITHUB_REPOSITORY"
          --verify-tag
          --generate-notes
          --title "SciModelingBench $GITHUB_REF_NAME"

  publish:
    name: Publish distribution to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sci-modeling-bench
    permissions:
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
