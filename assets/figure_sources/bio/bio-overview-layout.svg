<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="900" height="560" viewBox="0 0 900 560"
     role="img" aria-labelledby="title desc">
  <title id="title">SciModelingBench biomolecular design tasks</title>
  <desc id="desc">A compact scientific montage of DNA binding landscapes, Pho4-DNA binding, 5-prime UTR controlled ribosome loading, and GFP sequence-brightness ranking.</desc>

  <metadata>
    Pho4-DNA structure: RCSB PDB 1A0A. GFP structure: RCSB PDB 1GFL.
    Ribosome translation illustration adapted from the public-domain Wikimedia Commons
    work "Ribosome mRNA translation en.svg" by LadyofHats. Task-specific sequence,
    UTR construct, and measurement overlays are original vector artwork for SciModelingBench.
  </metadata>

  <style>
    .topic-label {
      font-family: 'Times New Roman', Times, serif;
      font-size: 13.5px;
      font-weight: 400;
      letter-spacing: 0;
      fill: #161616;
    }
    .detail-label {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10.5px;
      font-weight: 400;
      fill: #454b50;
    }
  </style>

  <defs>
    <linearGradient id="landscapeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f8797" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#6f8797" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="utrRibbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39a9b8"/>
      <stop offset="0.52" stop-color="#247f9f"/>
      <stop offset="1" stop-color="#4f62a5"/>
    </linearGradient>
    <linearGradient id="leaderRibbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d8dbe1"/>
      <stop offset="1" stop-color="#aeb6c2"/>
    </linearGradient>
    <linearGradient id="cdsRibbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#62b88a"/>
      <stop offset="1" stop-color="#23865d"/>
    </linearGradient>
    <linearGradient id="kozakRibbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8272b4"/>
      <stop offset="1" stop-color="#a36f9f"/>
    </linearGradient>
    <radialGradient id="gfpHalo">
      <stop offset="0" stop-color="#76ef9a" stop-opacity="0.46"/>
      <stop offset="0.42" stop-color="#56d77f" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#56d77f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ribosomeTop" cx="35%" cy="24%">
      <stop offset="0" stop-color="#d6e995"/>
      <stop offset="0.58" stop-color="#98bc58"/>
      <stop offset="1" stop-color="#628b3f"/>
    </radialGradient>
    <radialGradient id="ribosomeBottom" cx="34%" cy="24%">
      <stop offset="0" stop-color="#add08f"/>
      <stop offset="0.62" stop-color="#6aa35c"/>
      <stop offset="1" stop-color="#3e7545"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#344353" flood-opacity="0.14"/>
    </filter>
    <filter id="smallShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#243843" flood-opacity="0.20"/>
    </filter>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <g id="miniRibosome">
      <path d="M-23 1 C-24 -8 -15 -16 -2 -18 C11 -20 23 -15 26 -6 C29 2 21 9 10 10 C1 12 -7 8 -14 9 C-20 9 -24 6 -23 1 Z"
            fill="#889b5b" stroke="#40473a" stroke-width="1"/>
      <path d="M-17 10 C-16 3 -7 -1 3 0 C14 -1 22 4 21 11 C20 19 11 24 0 23 C-11 23 -19 18 -17 10 Z"
            fill="#667f51" stroke="#374339" stroke-width="1"/>
      <path d="M-12 -7 C-5 -11 5 -12 13 -9" fill="none" stroke="#c9d2ad" stroke-width="1" stroke-linecap="round" opacity="0.75"/>
    </g>
    <path id="curvedJoin" d="M1 -11 C-3 -7 -3 7 1 11 L7 11 C3 7 3 -7 7 -11 Z"/>
  </defs>

  <rect width="900" height="560" fill="#ffffff"/>

  <!-- TFBind8: restrained sequence-affinity landscape -->
  <g transform="translate(31 20)">
    <text x="0" y="11" class="topic-label">8-mer binding landscape</text>
    <g transform="translate(0 22)">
      <path d="M0 79 C20 77 27 69 39 70 C54 72 62 55 76 58 C92 60 98 28 113 34 C126 39 134 62 147 55 C160 48 169 18 184 25 C197 31 203 57 219 50 L219 91 L0 91 Z" fill="url(#landscapeFill)"/>
      <path d="M0 79 C20 77 27 69 39 70 C54 72 62 55 76 58 C92 60 98 28 113 34 C126 39 134 62 147 55 C160 48 169 18 184 25 C197 31 203 57 219 50" fill="none" stroke="#405f73" stroke-width="1.8" stroke-linecap="round"/>
      <g font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="500" text-anchor="middle" fill="#252a2e">
        <text x="19"  y="58">A</text>
        <text x="46"  y="49">C</text>
        <text x="73"  y="40">G</text>
        <text x="100" y="19">T</text>
        <text x="127" y="41">A</text>
        <text x="154" y="31">C</text>
        <text x="181" y="11">G</text>
        <text x="208" y="36">T</text>
      </g>
      <g fill="#405f73" stroke="#ffffff" stroke-width="0.7">
        <circle cx="100" cy="33.5" r="3.1"/><circle cx="181" cy="25" r="3.1"/>
      </g>
      <path d="M100 30.5V23" stroke="#9a5144" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Translation illustration shown in full, without crop or blur -->
  <g opacity="0.96">
    <image x="280" y="7" width="370" height="261"
           xlink:href="figure_sources/bio/ribosome-translation-clean.svg"
           preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- TFBind10 Pho4: exact biological object -->
  <g>
    <image x="42" y="163" width="278" height="288"
           xlink:href="figure_sources/bio/pho4-dna-transparent.png"
           preserveAspectRatio="xMidYMid meet"/>
  </g>
  <text x="95" y="158" class="topic-label">10-mer · Pho4 affinity</text>

  <!-- GFP: structure, sequence variation and measured brightness -->
  <g>
    <image x="678" y="101" width="210" height="286"
           xlink:href="figure_sources/bio/gfp-transparent.png"
           preserveAspectRatio="xMidYMid meet"/>
  </g>
  <g transform="translate(700 391)">
    <text x="0" y="0" class="topic-label">237-aa variants · fluorescence</text>
    <g transform="translate(3 10)" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="400">
      <text x="0" y="15" fill="#3e444a">… V K</text>
      <text x="53" y="15" fill="#9a5144">S</text>
      <text x="68" y="15" fill="#3e444a">Y G …</text>
      <path d="M58 19V28" stroke="#9a5144" stroke-width="1"/>
      <text x="58" y="42" text-anchor="middle" fill="#3f464c" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400">amino-acid substitution</text>
    </g>
  </g>

  <!-- Task-specific UTR construct: short, curved, and visually interlocked -->
  <g transform="translate(252 292)">
    <!-- A thin dark edge unifies the construct while flat fills distinguish regions. -->
    <path d="M30 71 C61 64 82 59 105 57 C167 52 227 55 284 62 C303 65 319 68 334 68 C346 68 355 68 365 67 C389 66 411 57 429 48"
          fill="none" stroke="#41484e" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- fixed leader -->
    <path d="M30 71 C61 64 82 59 105 57" fill="none" stroke="#c8cdd2" stroke-width="21.5" stroke-linecap="round"/>
    <text x="95" y="38" text-anchor="middle" class="detail-label">fixed 25 nt</text>

    <!-- variable UTR -->
    <path d="M105 57 C167 52 227 55 284 62" fill="none" stroke="#4d8793" stroke-width="21.5" stroke-linecap="butt"/>
    <text x="195" y="13" text-anchor="middle" class="topic-label">50-nt 5′UTR · translation</text>
    <g font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="500" text-anchor="middle" fill="#ffffff">
      <text x="124" y="60">A</text><text x="145" y="58.5">C</text><text x="166" y="58">G</text>
      <text x="187" y="58.5">U</text><text x="208" y="59.5">A</text><text x="229" y="61">C</text>
      <text x="250" y="63.5">G</text><text x="271" y="66">U</text>
    </g>
    <g transform="translate(191 35)">
      <text x="0" y="0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="600" fill="#8f4c40">uAUG</text>
      <path d="M0 4V13" stroke="#8f4c40" stroke-width="1"/>
    </g>

    <!-- Kozak and main start -->
    <path d="M284 62 C303 65 319 68 334 68" fill="none" stroke="#786f91" stroke-width="21.5" stroke-linecap="butt"/>
    <text x="307" y="40" text-anchor="middle" class="detail-label">Kozak</text>

    <!-- The main AUG is an aligned segment of the same ribbon. -->
    <path d="M334 68 C346 68 355 68 365 67" fill="none" stroke="#ad5c43" stroke-width="21.5" stroke-linecap="butt"/>

    <!-- fixed eGFP coding sequence -->
    <path d="M365 67 C389 66 411 57 429 48" fill="none" stroke="#4f8368" stroke-width="21.5" stroke-linecap="butt"/>
    <circle cx="429" cy="48" r="10.75" fill="#4f8368"/>

    <!-- Curved, tangent-aligned boundaries avoid mechanical vertical cuts. -->
    <use xlink:href="#curvedJoin" transform="translate(105 57) rotate(-4)" fill="#4d8793"/>
    <use xlink:href="#curvedJoin" transform="translate(284 62) rotate(7)" fill="#786f91"/>
    <use xlink:href="#curvedJoin" transform="translate(334 68)" fill="#ad5c43"/>
    <use xlink:href="#curvedJoin" transform="translate(365 67) rotate(-7)" fill="#4f8368"/>

    <text x="350" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#ffffff">AUG</text>
    <text x="400" y="62" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="600" fill="#ffffff">eGFP</text>

    <!-- Draw the cap last so the leader attaches behind it instead of covering it. -->
    <g transform="translate(10 63) rotate(-12)">
      <circle cx="0" cy="0" r="18" fill="#c99a45" stroke="#5c4a2c" stroke-width="1"/>
      <g font-family="'Times New Roman', Times, serif" font-weight="700" fill="#2e281f" text-anchor="middle">
        <text x="-6" y="5" font-size="14">m</text>
        <text x="1" y="-3" font-size="8.5">7</text>
        <text x="8" y="5" font-size="14">G</text>
      </g>
    </g>

    <!-- Compact polysome cue -->
    <g transform="translate(360 35) scale(.58)"><use xlink:href="#miniRibosome"/></g>
    <g transform="translate(392 25) scale(.66)"><use xlink:href="#miniRibosome"/></g>
    <g transform="translate(425 15) scale(.56)"><use xlink:href="#miniRibosome"/></g>
    <text x="360" y="-5" text-anchor="middle" class="topic-label">Mean ribosome load</text>
  </g>

  <!-- Journal-style inline category caption -->
  <g transform="translate(38 474)" fill="#111111" font-family="'Times New Roman', Times, serif">
    <text x="0" y="0" font-size="17.5" font-style="italic" font-weight="700">Biomolecular Design:</text>
    <text x="190" y="0" font-size="14.3">DNA-binding optimization, 5′UTR-controlled ribosome loading, and GFP sequence–brightness prediction.</text>
  </g>
</svg>
