<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="900" height="560" viewBox="0 0 900 560"
     role="img" aria-labelledby="title desc">
  <title id="title">SciModelingBench computational systems design tasks</title>
  <desc id="desc">A two-row, three-column scientific montage with the NASBench-101 macro skeleton and its official cell and channel-allocation examples, plus a two-by-two Hopper-v5 panel containing the action-space structure and three simulator rollout states.</desc>

  <style>
    .tileCaption { font-family: 'Times New Roman', Times, serif; font-size: 13.5px; font-weight: 400; fill: #202428; }
    .fine { font-family: 'Times New Roman', Times, serif; font-size: 11.5px; font-weight: 400; fill: #34383b; }
  </style>
  <defs>
    <clipPath id="standingCrop"><rect x="621" y="43" width="202" height="202" rx="1.5"/></clipPath>
    <clipPath id="flexedCrop"><rect x="386" y="278" width="202" height="202" rx="1.5"/></clipPath>
    <clipPath id="landingCrop"><rect x="621" y="278" width="202" height="202" rx="1.5"/></clipPath>
  </defs>

  <rect width="900" height="560" fill="#ffffff"/>

  <!-- Left column spans both rows: NASBench-101 panels (a), (b), and (c). -->
  <text x="25" y="34" class="tileCaption">NASBench-101 architecture</text>
  <image x="18" y="42" width="348" height="416"
         xlink:href="figure_sources/computational_systems/nasbench-model-structure.svg"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Upper-right 2x2 cell: faithful action-space redraw. -->
  <text x="381" y="34" class="tileCaption">Hopper-v5 action space</text>
  <image x="380" y="42" width="213" height="203"
         xlink:href="figure_sources/computational_systems/hopper-v5-action-space.svg"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Three exact rollout states; the SVG viewport crops empty sky and enlarges the body. -->
  <text x="616" y="34" class="tileCaption">rollout · upright</text>
  <g clip-path="url(#standingCrop)">
    <image x="575.1" y="-24.3" width="293.8" height="293.8"
           xlink:href="references/computational-systems/03-hopper-v5-frame-standing.png"
           preserveAspectRatio="none"/>
  </g>

  <text x="381" y="269" class="tileCaption">rollout · propulsion</text>
  <g clip-path="url(#flexedCrop)">
    <image x="340.1" y="210.7" width="293.8" height="293.8"
           xlink:href="references/computational-systems/04-hopper-v5-frame-flexed.png"
           preserveAspectRatio="none"/>
  </g>

  <text x="616" y="269" class="tileCaption">rollout · landing</text>
  <g clip-path="url(#landingCrop)">
    <image x="575.1" y="210.7" width="293.8" height="293.8"
           xlink:href="references/computational-systems/05-hopper-v5-frame-landing.png"
           preserveAspectRatio="none"/>
  </g>

  <!-- Journal-style category caption. -->
  <g transform="translate(38 526)" fill="#111111" font-family="'Times New Roman', Times, serif">
    <text x="0" y="0"><tspan font-size="18.5" font-style="italic" font-weight="700">Computational Systems Design:</tspan><tspan dx="10" font-size="13.2" font-style="normal" font-weight="400">NASBench cell search and Hopper-v5 policy ranking from frozen rollouts.</tspan></text>
  </g>
</svg>
