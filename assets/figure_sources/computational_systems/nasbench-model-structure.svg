<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="430" viewBox="0 0 360 430">
  <title>NASBench-101 model skeleton and official cell examples</title>
  <desc>The NASBench-101 shared model skeleton, the official Inception-like cell example, and the official channel-allocation example corresponding to panels a, b, and c of the project architecture diagram.</desc>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5.2" refY="3" orient="auto">
      <path d="M0 0L6 3L0 6Z" fill="#30373c"/>
    </marker>
    <marker id="smallArrow" markerWidth="5" markerHeight="5" refX="4.35" refY="2.5" orient="auto">
      <path d="M0 0L5 2.5L0 5Z" fill="#30373c"/>
    </marker>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 10.5px; fill: #202428; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 8.2px; fill: #252a2e; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 7.2px; fill: #252a2e; }
      .micro { font-family: Arial, Helvetica, sans-serif; font-size: 6.2px; fill: #252a2e; }
      .flow { fill: none; stroke: #30373c; stroke-width: 1.05; marker-end: url(#arrow); }
      .edge { fill: none; stroke: #30373c; stroke-width: 0.86; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#smallArrow); }
      .wire { fill: none; stroke: #30373c; stroke-width: 0.86; stroke-linecap: round; stroke-linejoin: round; }
      .stage { fill: #9bbdd8; stroke: #314655; stroke-width: 1.05; }
      .fixed { fill: #fafaf8; stroke: #31383d; stroke-width: 0.95; }
      .cell { fill: #e7db8e; stroke: #545239; stroke-width: 0.85; }
      .node { fill: #ffffff; stroke: #30373c; stroke-width: 0.85; }
      .combine { fill: #f3f3f0; stroke: #30373c; stroke-width: 0.8; }
    </style>
  </defs>
  <rect width="360" height="430" fill="#ffffff"/>

  <!-- (a) Shared model skeleton. Longer gaps retain visible arrow shafts. -->
  <g transform="translate(4 0)">
    <text x="0" y="8" class="small">(a) model skeleton</text>
    <path d="M82 34V15" class="flow"/>
    <rect x="50" y="35" width="64" height="21" rx="2" class="fixed"/>
    <text x="82" y="49" text-anchor="middle" class="label">dense</text>

    <path d="M82 70V56" class="flow"/>
    <rect x="25" y="71" width="114" height="21" rx="2" class="fixed"/>
    <text x="82" y="85" text-anchor="middle" class="label">global average pool</text>

    <path d="M82 113V92" class="flow"/>
    <rect x="40" y="114" width="84" height="50" rx="9" class="stage"/>
    <text x="82" y="143" text-anchor="middle" class="label">stack 3</text>

    <path d="M82 181V164" class="flow"/>
    <rect x="29" y="182" width="106" height="21" rx="2" class="fixed"/>
    <text x="82" y="196" text-anchor="middle" class="label">downsample</text>

    <path d="M82 224V203" class="flow"/>
    <rect x="40" y="225" width="84" height="50" rx="9" class="stage"/>
    <text x="82" y="254" text-anchor="middle" class="label">stack 2</text>

    <path d="M82 292V275" class="flow"/>
    <rect x="29" y="293" width="106" height="21" rx="2" class="fixed"/>
    <text x="82" y="307" text-anchor="middle" class="label">downsample</text>

    <path d="M82 335V314" class="flow"/>
    <rect x="40" y="336" width="84" height="47" rx="9" class="stage"/>
    <text x="82" y="363" text-anchor="middle" class="label">stack 1</text>

    <path d="M82 400V383" class="flow"/>
    <rect x="31" y="401" width="102" height="21" rx="2" class="fixed"/>
    <text x="82" y="415" text-anchor="middle" class="label">3×3 conv stem</text>
    <path d="M82 430V422" class="flow"/>

    <!-- Stack 2 expands to exactly three repeated modules. -->
    <path d="M124 238C135 238 137 225 148 225" fill="none" stroke="#687078" stroke-width="0.8" stroke-dasharray="3 2"/>
    <path d="M124 265C135 265 137 292 148 292" fill="none" stroke="#687078" stroke-width="0.8" stroke-dasharray="3 2"/>
    <rect x="147" y="214" width="66" height="90" rx="8" fill="#8fb4d2" stroke="#314655" stroke-width="1"/>
    <rect x="155" y="221" width="50" height="22" rx="2" class="cell"/>
    <rect x="155" y="248" width="50" height="22" rx="2" class="cell"/>
    <rect x="155" y="275" width="50" height="22" rx="2" class="cell"/>
    <text x="180" y="235.5" text-anchor="middle" class="small">cell 2–3</text>
    <text x="180" y="262.5" text-anchor="middle" class="small">cell 2–2</text>
    <text x="180" y="289.5" text-anchor="middle" class="small">cell 2–1</text>
    <path d="M180 214V201" class="flow"/>
    <path d="M180 318V304" class="flow"/>
  </g>

  <!-- (b) Official Inception-like seven-vertex cell. -->
  <g transform="translate(220 20)">
    <text x="0" y="7" class="small">(b) cell example</text>

    <!-- Orthogonal, rounded paths reproduce the readable topology of the
         original NASBench example without letting edges cross node labels. -->
    <path d="M65 166V154Q65 150 61 150H24Q20 150 20 146V124" class="edge"/>
    <path d="M65 166V146Q65 142 61 142H54Q50 142 50 138V124" class="edge"/>
    <path d="M65 166V142Q65 138 69 138H76Q80 138 80 134V124" class="edge"/>
    <path d="M65 166V154Q65 150 69 150H106Q110 150 110 146V124" class="edge"/>

    <path d="M20 100V52Q20 48 24 48H42Q46 48 46 44V32Q46 28 50 28H54" class="edge"/>
    <path d="M50 100V60Q50 56 54 56H57Q61 56 61 52V39" class="edge"/>
    <path d="M80 100V80" class="edge"/>
    <path d="M80 56V48Q80 44 76 44H73Q69 44 69 40V39" class="edge"/>
    <path d="M110 100V52Q110 48 106 48H88Q84 48 84 44V32Q84 28 80 28H76" class="edge"/>

    <circle cx="65" cy="176" r="10" class="node"/>
    <text x="65" y="179" text-anchor="middle" class="tiny">in</text>
    <circle cx="20" cy="112" r="12" class="node"/>
    <circle cx="50" cy="112" r="12" class="node"/>
    <circle cx="80" cy="112" r="12" class="node"/>
    <circle cx="110" cy="112" r="12" class="node"/>
    <circle cx="80" cy="68" r="12" class="node"/>
    <circle cx="65" cy="28" r="11" class="node"/>
    <text x="20" y="109" text-anchor="middle" class="tiny"><tspan x="20">conv</tspan><tspan x="20" dy="7">1×1</tspan></text>
    <text x="50" y="109" text-anchor="middle" class="tiny"><tspan x="50">conv</tspan><tspan x="50" dy="7">3×3</tspan></text>
    <text x="80" y="109" text-anchor="middle" class="tiny"><tspan x="80">conv</tspan><tspan x="80" dy="7">3×3</tspan></text>
    <text x="110" y="109" text-anchor="middle" class="tiny"><tspan x="110">m.p.</tspan><tspan x="110" dy="7">3×3</tspan></text>
    <text x="80" y="65" text-anchor="middle" class="tiny"><tspan x="80">conv</tspan><tspan x="80" dy="7">3×3</tspan></text>
    <text x="65" y="31" text-anchor="middle" class="tiny">out</text>
  </g>

  <!-- (c) Official fixed channel-allocation / projection semantics. -->
  <g transform="translate(220 224)">
    <text x="0" y="7" class="small">(c) channel allocation</text>

    <!-- A single input trunk fans out cleanly to four projections. -->
    <path d="M65 185V181" class="wire"/>
    <path d="M65 181H17Q13 181 13 177V159" class="edge"/>
    <path d="M65 181H41Q37 181 37 177V135" class="edge"/>
    <path d="M65 181H83Q87 181 87 177V172" class="edge"/>
    <path d="M65 181H117Q121 181 121 177V172" class="edge"/>

    <!-- Residual bypass enters the final addition from the left. -->
    <path d="M13 147V47Q13 43 17 43H58" class="edge"/>

    <!-- Direct F=64 branch enters concatenation from the left. -->
    <path d="M37 123V106" class="edge"/>
    <path d="M37 82V73Q37 69 41 69H58" class="edge"/>

    <!-- Two right branches add first, creating a new F=64 tensor. -->
    <path d="M87 160V155" class="edge"/>
    <path d="M121 160V155" class="edge"/>
    <path d="M87 131V123Q87 119 91 119H97" class="edge"/>
    <path d="M121 131V123Q121 119 117 119H111" class="edge"/>
    <path d="M104 112V106" class="edge"/>

    <!-- The added tensor enters concatenation from the right; concatenated
         channels then meet the residual at the upper +. -->
    <path d="M104 82V73Q104 69 100 69H72" class="edge"/>
    <path d="M65 62V50" class="edge"/>
    <path d="M65 36V29" class="edge"/>

    <rect x="0" y="147" width="26" height="12" rx="1.5" class="fixed"/>
    <rect x="24" y="123" width="26" height="12" rx="1.5" class="fixed"/>
    <rect x="74" y="160" width="26" height="12" rx="1.5" class="fixed"/>
    <rect x="108" y="160" width="26" height="12" rx="1.5" class="fixed"/>
    <text x="13" y="155.2" text-anchor="middle" class="micro">1×1 proj</text>
    <text x="37" y="131.2" text-anchor="middle" class="micro">1×1 proj</text>
    <text x="87" y="168.2" text-anchor="middle" class="micro">1×1 proj</text>
    <text x="121" y="168.2" text-anchor="middle" class="micro">1×1 proj</text>

    <circle cx="65" cy="194" r="9" class="node"/>
    <text x="65" y="197" text-anchor="middle" class="tiny">in</text>
    <text x="77" y="197" class="tiny">F=128</text>

    <circle cx="37" cy="94" r="12" class="node"/>
    <circle cx="104" cy="94" r="12" class="node"/>
    <circle cx="87" cy="143" r="12" class="node"/>
    <circle cx="121" cy="143" r="12" class="node"/>
    <text x="37" y="96.5" text-anchor="middle" class="tiny">F=64</text>
    <text x="104" y="96.5" text-anchor="middle" class="tiny">F=64</text>
    <text x="87" y="145.5" text-anchor="middle" class="tiny">F=64</text>
    <text x="121" y="145.5" text-anchor="middle" class="tiny">F=64</text>

    <circle cx="104" cy="119" r="7" class="combine"/>
    <text x="104" y="122" text-anchor="middle" class="tiny">+</text>
    <circle cx="65" cy="69" r="7" class="combine"/>
    <text x="65" y="72" text-anchor="middle" class="tiny">&amp;</text>
    <circle cx="65" cy="43" r="7" class="combine"/>
    <text x="65" y="46" text-anchor="middle" class="tiny">+</text>

    <circle cx="65" cy="20" r="9" class="node"/>
    <text x="65" y="23" text-anchor="middle" class="tiny">out</text>
    <text x="77" y="23" class="tiny">F=128</text>
  </g>
</svg>
