<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="900" height="560" viewBox="0 0 900 560"
     role="img" aria-labelledby="title desc">
  <title id="title">SciModelingBench materials discovery tasks</title>
  <desc id="desc">A compact scientific montage of superconductor composition ranking and context-aware DrugMatrix response ranking.</desc>

  <metadata>
    YBCO lattice and Meissner-effect photograph: Wikimedia Commons, CC BY-SA.
    Sprague-Dawley rat photograph: Wikimedia Commons, CC BY-SA 2.0.
    Molecular depictions were generated with RDKit from the official DrugMatrix
    curated SMILES file. The composition vector is original schematic artwork.
  </metadata>

  <style>
    .topic {
      font-family: 'Times New Roman', Times, serif;
      font-size: 15px;
      font-weight: 400;
      fill: #151515;
    }
    .detail {
      font-family: 'Times New Roman', Times, serif;
      font-size: 13px;
      font-weight: 400;
      fill: #303438;
    }
    .technical {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11.5px;
      font-weight: 400;
      fill: #2f363b;
    }
  </style>

  <defs>
    <clipPath id="meissnerCrop">
      <ellipse cx="308" cy="138" rx="143" ry="89"/>
    </clipPath>
    <clipPath id="ratCrop">
      <ellipse cx="635" cy="288" rx="170" ry="121"/>
    </clipPath>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0 0L7 3.5L0 7Z" fill="#5d646a"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#ffffff"/>

  <!-- Superconductor: structure and physical phenomenon dominate the upper-left. -->
  <image x="12" y="4" width="140" height="232"
         xlink:href="figure_sources/materials/ybcO-lattice.svg"
         preserveAspectRatio="xMidYMid meet"/>
  <g clip-path="url(#meissnerCrop)">
    <image x="160" y="42" width="296" height="191"
           xlink:href="figure_sources/materials/meissner-levitation.jpg"
           preserveAspectRatio="xMidYMid slice"/>
    <ellipse cx="308" cy="138" rx="143" ry="89" fill="none" stroke="#ffffff" stroke-width="5"/>
  </g>
  <text x="82" y="244" text-anchor="middle" class="detail">YBCO lattice</text>
  <text x="308" y="248" text-anchor="middle" class="detail">superconducting levitation</text>

  <!-- Task input: formulas encoded as one normalized elemental vector. -->
  <g transform="translate(25 282)">
    <text x="0" y="0" class="topic">Elemental composition vector</text>
    <text x="0" y="34" font-family="'Times New Roman', Times, serif" font-size="15.5" fill="#25292c">YBa<tspan baseline-shift="sub" font-size="10.5">2</tspan>Cu<tspan baseline-shift="sub" font-size="10.5">3</tspan>O<tspan baseline-shift="sub" font-size="10.5">7</tspan></text>
    <text x="128" y="34" font-family="'Times New Roman', Times, serif" font-size="15.5" fill="#25292c">Bi<tspan baseline-shift="sub" font-size="10.5">2</tspan>Sr<tspan baseline-shift="sub" font-size="10.5">2</tspan>CaCu<tspan baseline-shift="sub" font-size="10.5">2</tspan>O<tspan baseline-shift="sub" font-size="10.5">8</tspan></text>
    <text x="284" y="34" font-family="'Times New Roman', Times, serif" font-size="15.5" fill="#25292c">HgBa<tspan baseline-shift="sub" font-size="10.5">2</tspan>Ca<tspan baseline-shift="sub" font-size="10.5">2</tspan>Cu<tspan baseline-shift="sub" font-size="10.5">3</tspan>O<tspan baseline-shift="sub" font-size="10.5">8</tspan></text>
    <g transform="translate(0 57)">
      <rect x="0" y="0" width="56" height="20" fill="#58788a"/>
      <rect x="56" y="0" width="98" height="20" fill="#8b725c"/>
      <rect x="154" y="0" width="38" height="20" fill="#8a8f67"/>
      <rect x="192" y="0" width="166" height="20" fill="#a65d50"/>
      <rect x="358" y="0" width="72" height="20" fill="#7b7191"/>
      <text x="28" y="42" text-anchor="middle" class="technical">Ba</text>
      <text x="105" y="42" text-anchor="middle" class="technical">Cu</text>
      <text x="173" y="42" text-anchor="middle" class="technical">Ca</text>
      <text x="275" y="42" text-anchor="middle" class="technical">O</text>
      <text x="394" y="42" text-anchor="middle" class="technical">other</text>
    </g>
    <text x="0" y="126" class="detail">normalized fractions across 86 elements</text>
  </g>

  <!-- DrugMatrix: molecular structures above the measured animal response. -->
  <g>
    <image x="432" y="3" width="136" height="119"
           xlink:href="figure_sources/materials/acetaminophen.svg" preserveAspectRatio="xMidYMid meet"/>
    <image x="552" y="3" width="136" height="119"
           xlink:href="figure_sources/materials/ibuprofen.svg" preserveAspectRatio="xMidYMid meet"/>
    <image x="672" y="3" width="136" height="119"
           xlink:href="figure_sources/materials/caffeine.svg" preserveAspectRatio="xMidYMid meet"/>
    <text x="500" y="128" text-anchor="middle" class="detail">acetaminophen</text>
    <text x="620" y="128" text-anchor="middle" class="detail">ibuprofen</text>
    <text x="740" y="128" text-anchor="middle" class="detail">caffeine</text>
  </g>

  <path d="M635 142V166" stroke="#5d646a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="649" y="158" class="detail">treatment</text>

  <g clip-path="url(#ratCrop)">
    <image x="460" y="161" width="350" height="254"
           xlink:href="figure_sources/materials/sprague-dawley-rat.jpg"
           preserveAspectRatio="xMidYMid slice"/>
    <ellipse cx="635" cy="288" rx="170" ry="121" fill="none" stroke="#ffffff" stroke-width="6"/>
  </g>
  <text x="635" y="429" text-anchor="middle" class="topic">measured clinical-pathology response</text>

  <!-- Journal-style category caption carries the task explanation. -->
  <g transform="translate(38 478)" fill="#111111" font-family="'Times New Roman', Times, serif">
    <text x="0" y="0" font-size="18.5" font-style="italic" font-weight="700">Materials Discovery:</text>
    <text x="199" y="0" font-size="14.3">superconducting T<tspan baseline-shift="sub" font-size="10">c</tspan> ranking from composition and drug-response ranking from measured rat studies.</text>
  </g>
</svg>
